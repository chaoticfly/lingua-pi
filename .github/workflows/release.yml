name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o lingua-pi${{ matrix.ext }} .

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p pkg/lingua-pi
          cp lingua-pi pkg/lingua-pi/
          cp -r static pkg/lingua-pi/
          tar -czf lingua-pi-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz -C pkg lingua-pi

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p pkg/lingua-pi
          cp lingua-pi${{ matrix.ext }} pkg/lingua-pi/
          cp -r static pkg/lingua-pi/
          cd pkg && zip -r ../lingua-pi-${{ matrix.goos }}-${{ matrix.goarch }}.zip lingua-pi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingua-pi-${{ matrix.goos }}-${{ matrix.goarch }}
          path: lingua-pi-${{ matrix.goos }}-${{ matrix.goarch }}.*
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: LinguaPi ${{ github.ref_name }}
          body: |
            ## LinguaPi ${{ github.ref_name }}

            ### Install

            **macOS / Linux — one-liner:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/chaoticfly/lingua-pi/${{ github.ref_name }}/scripts/install.sh | bash
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/chaoticfly/lingua-pi/${{ github.ref_name }}/scripts/install.ps1 | iex
            ```

            ### Manual install
            Download the archive for your platform below, extract it, and run `./lingua-pi` from the extracted directory.

            ### Platforms
            | File | OS | Arch |
            |------|----|------|
            | `lingua-pi-linux-amd64.tar.gz` | Linux | x86-64 |
            | `lingua-pi-linux-arm64.tar.gz` | Linux | ARM64 (Raspberry Pi 5) |
            | `lingua-pi-darwin-amd64.tar.gz` | macOS | Intel |
            | `lingua-pi-darwin-arm64.tar.gz` | macOS | Apple Silicon |
            | `lingua-pi-windows-amd64.zip` | Windows | x86-64 |
            | `lingua-pi-windows-arm64.zip` | Windows | ARM64 |
          generate_release_notes: true
          files: dist/*
